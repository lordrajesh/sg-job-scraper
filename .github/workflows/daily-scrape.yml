name: Daily HK Job Scrape

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM HKT (UTC+8)
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create data directory
        run: mkdir -p frontend/public/data

      - name: Run scraper (all categories, 5 sources)
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python generate_data.py --force

      - name: Verify scraped data
        run: |
          echo "=== Scraped Data ==="
          ls -la frontend/public/data/
          echo "Total JSON files: $(ls frontend/public/data/*.json 2>/dev/null | wc -l)"

      - name: Hunter.io enrichment (recruiter emails)
        env:
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python hunter_enricher.py --max 30
        continue-on-error: true

      - name: Build Astro frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy Astro build via FTPS
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          count=0
          failed=0
          find ./frontend/dist/ -type f | while read f; do
            remote_path="/hk-jobs/${f#./frontend/dist/}"
            remote_dir=$(dirname "$remote_path")
            curl --ssl-reqd --insecure \
              --ftp-create-dirs \
              -T "$f" \
              "ftp://$FTP_HOST$remote_path" \
              --user "$FTP_USER:$FTP_PASS" \
              --connect-timeout 30 \
              --max-time 120 \
              --retry 2 \
              -s || echo "FAILED: $remote_path"
          done
          echo "Done — Astro build deployed"

      - name: Upload counter.php via FTPS
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          for f in ./frontend/public/*; do
            [ -d "$f" ] && continue
            fname=$(basename "$f")
            [[ "$fname" == ".htaccess" ]] && continue
            curl --ssl-reqd --insecure \
              -T "$f" \
              "ftp://$FTP_HOST/hk-jobs/$fname" \
              --user "$FTP_USER:$FTP_PASS" \
              --connect-timeout 30 \
              --max-time 60 \
              --retry 2 \
              -s
            echo "Uploaded $fname"
          done
          echo "Done — public files deployed"
