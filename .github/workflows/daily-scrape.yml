name: Daily SG Job Scrape

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM SGT (UTC+8)
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create data directory
        run: mkdir -p frontend/public/data

      - name: Run scraper (all categories, 5 sources)
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python generate_data.py --force

      - name: Verify scraped data
        run: |
          echo "=== Scraped Data ==="
          ls -la frontend/public/data/
          echo "Total JSON files: $(ls frontend/public/data/*.json 2>/dev/null | wc -l)"

      - name: Build Astro frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          production: true
          echo "Done — public files deployed"
